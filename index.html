<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinConvert PRO</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #f8fafc;
            padding: 20px;
        }

        .card {
            width: 100%;
            max-width: 400px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .logo b {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .status {
            font-size: 12px;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .input-box {
            margin-bottom: 16px;
        }

        .input-box label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .input-box input {
            width: 100%;
            height: 48px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 0 14px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            outline: none;
        }

        .input-box input:focus {
            border-color: #38bdf8;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .select-card {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 10px;
        }

        .select-card span {
            display: block;
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .select-body {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .select-body img {
            width: 22px;
            height: 16px;
            border-radius: 2px;
            object-fit: cover;
        }

        .select-body select {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .select-body select option {
            background: #0f172a;
            color: #fff;
        }

        .swap-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #334155;
            border: none;
            color: #38bdf8;
            font-size: 16px;
            cursor: pointer;
            transition: 0.2s;
            flex-shrink: 0;
            margin-top: 12px;
        }

        .swap-btn:hover {
            background: #38bdf8;
            color: #0f172a;
        }

        .result-box {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            margin-bottom: 16px;
        }

        .result-box .label {
            font-size: 12px;
            color: #94a3b8;
        }

        .result-box .value {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
            margin: 4px 0;
        }

        .result-box .sub {
            font-size: 11px;
            color: #64748b;
        }

        .btn {
            width: 100%;
            height: 48px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn:hover {
            background: #0284c7;
            color: #fff;
        }

        .time {
            font-size: 10px;
            color: #475569;
            text-align: center;
            margin-top: 12px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo">⚡ CoinConvert <b>PRO</b></div>
            <div class="status">● Live</div>
        </div>

        <div class="input-box">
            <label>Summa</label>
            <input type="number" id="amount" value="100" min="1">
        </div>

        <div class="row">
            <div class="select-card">
                <span>Qaysi valyutadan</span>
                <div class="select-body">
                    <img src="https://flagcdn.com/w40/us.png" id="from-flag" alt="flag">
                    <select id="from-currency"></select>
                </div>
            </div>

            <button class="swap-btn" id="swap-btn">⇄</button>

            <div class="select-card">
                <span>Qaysi valyutaga</span>
                <div class="select-body">
                    <img src="https://flagcdn.com/w40/uz.png" id="to-flag" alt="flag">
                    <select id="to-currency"></select>
                </div>
            </div>
        </div>

        <div class="result-box">
            <div class="label">Natija:</div>
            <div class="value" id="result-amount">...</div>
            <div class="sub" id="rate-info">1 USD = ... UZS</div>
        </div>

        <button class="btn" id="convert-btn">Hisoblash</button>
        <div class="time" id="update-time">Real vaqt rejimida</div>
    </div>

    <script>
        const currencyList = {
            "USD": { country: "US", name: "USD" },
            "UZS": { country: "UZ", name: "UZS" },
            "EUR": { country: "FR", name: "EUR" },
            "RUB": { country: "RU", name: "RUB" },
            "CNY": { country: "CN", name: "CNY" },
            "TRY": { country: "TR", name: "TRY" },
            "GBP": { country: "GB", name: "GBP" },
            "KZT": { country: "KZ", name: "KZT" },
            "AED": { country: "AE", name: "AED" }
        };

        const fromSelect = document.getElementById("from-currency");
        const toSelect = document.getElementById("to-currency");
        const amountInput = document.getElementById("amount");
        const resultAmount = document.getElementById("result-amount");
        const rateInfo = document.getElementById("rate-info");
        const fromFlag = document.getElementById("from-flag");
        const toFlag = document.getElementById("to-flag");
        const swapBtn = document.getElementById("swap-btn");
        const convertBtn = document.getElementById("convert-btn");
        const updateTime = document.getElementById("update-time");

        Object.keys(currencyList).forEach(code => {
            let opt1 = new Option(code, code);
            let opt2 = new Option(code, code);
            if (code === "USD") opt1.selected = true;
            if (code === "UZS") opt2.selected = true;
            fromSelect.add(opt1);
            toSelect.add(opt2);
        });

        function updateFlags() {
            fromFlag.src = `https://flagcdn.com/w40/${currencyList[fromSelect.value].country.toLowerCase()}.png`;
            toFlag.src = `https://flagcdn.com/w40/${currencyList[toSelect.value].country.toLowerCase()}.png`;
        }

        async function fetchRates() {
            let amount = parseFloat(amountInput.value) || 1;
            resultAmount.innerText = "Yuklanmoqda...";

            try {
                let res = await fetch(`https://open.er-api.com/v6/latest/${fromSelect.value}`);
                let data = await res.json();
                let rate = data.rates[toSelect.value];
                let total = (amount * rate).toLocaleString('en-US', { maximumFractionDigits: 2 });

                resultAmount.innerText = `${total} ${toSelect.value}`;
                rateInfo.innerText = `1 ${fromSelect.value} = ${rate.toLocaleString()} ${toSelect.value}`;
                updateTime.innerText = `Yangilandi: ${new Date().toLocaleTimeString()}`;
            } catch (e) {
                resultAmount.innerText = "Xatolik!";
            }
        }

        fromSelect.addEventListener("change", () => { updateFlags(); fetchRates(); });
        toSelect.addEventListener("change", () => { updateFlags(); fetchRates(); });
        convertBtn.addEventListener("click", fetchRates);
        swapBtn.addEventListener("click", () => {
            let temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            updateFlags();
            fetchRates();
        });

        updateFlags();
        fetchRates();
    </script>
</body>
</html>
