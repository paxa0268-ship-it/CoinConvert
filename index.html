<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinConvert PRO - Valyuta Kurslari va Konvertor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #0f172a;
            color: #f8fafc;
            padding: 20px 10px;
        }

        .card {
            width: 100%;
            max-width: 420px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 20px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .logo b {
            color: #38bdf8;
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .status {
            font-size: 12px;
            color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: 600;
        }

        .input-box {
            margin-bottom: 16px;
        }

        .input-box label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 6px;
        }

        .input-box input {
            width: 100%;
            height: 48px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 0 14px;
            color: #fff;
            font-size: 18px;
            font-weight: 600;
            outline: none;
        }

        .row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .select-card {
            flex: 1;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 8px 10px;
        }

        .select-card span {
            display: block;
            font-size: 10px;
            color: #64748b;
            text-transform: uppercase;
            margin-bottom: 4px;
        }

        .select-body {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .select-body img {
            width: 22px;
            height: 16px;
            border-radius: 2px;
            object-fit: cover;
        }

        .select-body select {
            width: 100%;
            background: transparent;
            border: none;
            color: #fff;
            font-size: 13px;
            font-weight: 600;
            outline: none;
            cursor: pointer;
        }

        .select-body select option {
            background: #0f172a;
            color: #fff;
        }

        .swap-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: #334155;
            border: none;
            color: #38bdf8;
            font-size: 16px;
            cursor: pointer;
            flex-shrink: 0;
            margin-top: 12px;
        }

        .result-box {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 12px;
            padding: 14px;
            text-align: center;
            margin-bottom: 16px;
        }

        .result-box .value {
            font-size: 24px;
            font-weight: 700;
            color: #38bdf8;
            margin: 4px 0;
        }

        .result-box .sub {
            font-size: 11px;
            color: #64748b;
        }

        .btn {
            width: 100%;
            height: 48px;
            background: #38bdf8;
            border: none;
            border-radius: 10px;
            color: #0f172a;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        /* Qo'shimcha Mashhur valyutalar bloki */
        .rates-table {
            margin-top: 20px;
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            border: 1px solid #334155;
        }

        .rates-table h4 {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 10px;
            text-align: center;
        }

        .rate-row {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            padding: 6px 0;
            border-bottom: 1px dashed #1e293b;
        }

        .rate-row:last-child {
            border-bottom: none;
        }

        /* Footer va Privacy Policy */
        footer {
            text-align: center;
            font-size: 11px;
            color: #64748b;
            max-width: 400px;
        }

        footer a {
            color: #38bdf8;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo">⚡ CoinConvert <b>PRO</b></div>
            <div class="status">● Live</div>
        </div>

        <div class="input-box">
            <label>Summa</label>
            <input type="number" id="amount" value="100" min="1">
        </div>

        <div class="row">
            <div class="select-card">
                <span>Qaysi valyutadan</span>
                <div class="select-body">
                    <img src="https://flagcdn.com/w40/us.png" id="from-flag" alt="flag">
                    <select id="from-currency"></select>
                </div>
            </div>

            <button class="swap-btn" id="swap-btn">⇄</button>

            <div class="select-card">
                <span>Qaysi valyutaga</span>
                <div class="select-body">
                    <img src="https://flagcdn.com/w40/uz.png" id="to-flag" alt="flag">
                    <select id="to-currency"></select>
                </div>
            </div>
        </div>

        <div class="result-box">
            <div class="value" id="result-amount">...</div>
            <div class="sub" id="rate-info">1 USD = ... UZS</div>
        </div>

        <button class="btn" id="convert-btn">Hisoblash</button>

        <div class="rates-table">
            <h4>Asosiy valyutalar (1 UZS ga nisbatan):</h4>
            <div class="rate-row"><span>🇺🇸 1 USD</span><b id="usd-rate">...</b></div>
            <div class="rate-row"><span>🇪🇺 1 EUR</span><b id="eur-rate">...</b></div>
            <div class="rate-row"><span>🇷🇺 1 RUB</span><b id="rub-rate">...</b></div>
        </div>
    </div>

    <footer>
        <p>© 2026 CoinConvert PRO. Barcha huquqlar himoyalangan.</p>
        <p><a href="#privacy" onclick="alert('Maxfiylik Siyosati: Ushbu sayt foydalanuvchilarning shaxsiy ma\'lumotlarini yig\'maydi. Valyuta kurslari ochiq manbalardan real vaqtda olinadi.')">Privacy Policy (Maxfiylik Siyosati)</a></p>
    </footer>

    <script>
        const currencyList = {
            "USD": { country: "US" },
            "UZS": { country: "UZ" },
            "EUR": { country: "FR" },
            "RUB": { country: "RU" },
            "CNY": { country: "CN" },
            "TRY": { country: "TR" },
            "GBP": { country: "GB" },
            "KZT": { country: "KZ" },
            "AED": { country: "AE" }
        };

        const fromSelect = document.getElementById("from-currency");
        const toSelect = document.getElementById("to-currency");
        const amountInput = document.getElementById("amount");
        const resultAmount = document.getElementById("result-amount");
        const rateInfo = document.getElementById("rate-info");
        const fromFlag = document.getElementById("from-flag");
        const toFlag = document.getElementById("to-flag");
        const swapBtn = document.getElementById("swap-btn");
        const convertBtn = document.getElementById("convert-btn");

        Object.keys(currencyList).forEach(code => {
            let opt1 = new Option(code, code);
            let opt2 = new Option(code, code);
            if (code === "USD") opt1.selected = true;
            if (code === "UZS") opt2.selected = true;
            fromSelect.add(opt1);
            toSelect.add(opt2);
        });

        function updateFlags() {
            fromFlag.src = `https://flagcdn.com/w40/${currencyList[fromSelect.value].country.toLowerCase()}.png`;
            toFlag.src = `https://flagcdn.com/w40/${currencyList[toSelect.value].country.toLowerCase()}.png`;
        }

        async function fetchRates() {
            let amount = parseFloat(amountInput.value) || 1;
            resultAmount.innerText = "Yuklanmoqda...";

            try {
                let res = await fetch(`https://open.er-api.com/v6/latest/${fromSelect.value}`);
                let data = await res.json();
                let rate = data.rates[toSelect.value];
                let total = (amount * rate).toLocaleString('en-US', { maximumFractionDigits: 2 });

                resultAmount.innerText = `${total} ${toSelect.value}`;
                rateInfo.innerText = `1 ${fromSelect.value} = ${rate.toLocaleString()} ${toSelect.value}`;
            } catch (e) {
                resultAmount.innerText = "Xatolik!";
            }
        }

        // Asosiy kurslarni (USD, EUR, RUB) pastdagi jadvalga chiqarish
        async function fetchMainRates() {
            try {
                let res = await fetch(`https://open.er-api.com/v6/latest/USD`);
                let data = await res.json();
                let uzsRate = data.rates["UZS"];
                let eurRate = data.rates["EUR"];
                let rubRate = data.rates["RUB"];

                document.getElementById("usd-rate").innerText = `${uzsRate.toLocaleString()} UZS`;
                document.getElementById("eur-rate").innerText = `${(uzsRate / eurRate).toFixed(2).toLocaleString()} UZS`;
                document.getElementById("rub-rate").innerText = `${(uzsRate / rubRate).toFixed(2).toLocaleString()} UZS`;
            } catch (e) {}
        }

        fromSelect.addEventListener("change", () => { updateFlags(); fetchRates(); });
        toSelect.addEventListener("change", () => { updateFlags(); fetchRates(); });
        convertBtn.addEventListener("click", fetchRates);
        swapBtn.addEventListener("click", () => {
            let temp = fromSelect.value;
            fromSelect.value = toSelect.value;
            toSelect.value = temp;
            updateFlags();
            fetchRates();
        });

        updateFlags();
        fetchRates();
        fetchMainRates();
    </script>
</body>
</html>
