<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoinConvert PRO</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="logo">
                <span>⚡ CoinConvert <b>PRO</b></span>
            </div>
            <div class="status-badge" id="live-status">
                <span class="dot"></span> Live FX
            </div>
        </div>

        <div class="input-group">
            <label>Summa</label>
            <div class="input-wrapper">
                <input type="number" id="amount" value="100" min="0" placeholder="0.00">
            </div>
        </div>

        <div class="converter-row">
            <div class="select-card">
                <span class="label">Sizda bor</span>
                <div class="select-body">
                    <img src="https://flagcdn.com/w40/us.png" id="from-flag" alt="flag">
                    <select id="from-currency"></select>
                </div>
            </div>

            <button class="swap-btn" id="swap-btn" title="Almashtirish">⇄</button>

            <div class="select-card">
                <span class="label">Olasiz</span>
                <div class="select-body">
                    <img src="https://flagcdn.com/w40/uz.png" id="to-flag" alt="flag">
                    <select id="to-currency"></select>
                </div>
            </div>
        </div>

        <div class="result-box">
            <span class="result-label">Natija:</span>
            <div class="result-amount" id="result-amount">0.00</div>
            <div class="rate-info" id="rate-info">1 USD = 0 UZS</div>
        </div>

        <button class="convert-btn" id="convert-btn">
            🧮 Hisoblash
        </button>

        <div class="footer-info" id="update-time">
            Kurslar real-vaqt rejimida yangilanadi
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
